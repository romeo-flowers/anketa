:root{
  --sage:#8ca28c;
  --sage-dark:#5a7a5a;
  --cream:#ece7e1;
  --paper:#faf8f5;
  --ink:#2c2a27;
  --muted:#8a8378;
  --line:#ded7cc;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--cream);
  color:var(--ink);
  font-family:'Circe', -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1000px;margin:0 auto;padding:0 0 40px;}
header{
  background:var(--sage);
  color:#fff;
  padding:36px 24px 28px;
  text-align:center;
}
header img.logo{height:44px;margin-bottom:10px;}
header .brand{
  font-family:'Playfair Display',Georgia,serif;
  font-size:28px;
  letter-spacing:.04em;
  margin:0;
}
header .brand small{
  display:block;
  font-size:12px;
  letter-spacing:.35em;
  font-weight:400;
  margin-top:2px;
}
header h1{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:500;
  font-size:22px;
  margin:16px 0 4px;
}
header p{margin:0;font-size:14px;opacity:.9;}

main{padding:28px 20px 10px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:4px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.card .photo{
  width:100%;
  aspect-ratio:1/1;
  background:var(--cream) center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:13px;
}
.card .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.card .name{font-family:'Playfair Display',Georgia,serif;font-size:17px;line-height:1.3;}
.card .price{font-size:15px;font-weight:600;color:var(--sage-dark);}
.card button.want{
  margin-top:auto;
  background:var(--sage);
  color:#fff;
  border:none;
  padding:10px 12px;
  font-family:inherit;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:2px;
}
.card button.want:hover{background:var(--sage-dark);}

.card .thanks{display:none;padding-top:6px;border-top:1px solid var(--line);margin-top:6px;font-size:13.5px;}
.card.sent button.want{display:none;}
.card.sent .thanks{display:flex;flex-direction:column;gap:8px;}
.thanks .kaspi-link{
  display:inline-block;
  text-align:center;
  background:#e73c5e;
  color:#fff;
  text-decoration:none;
  padding:9px;
  border-radius:2px;
  font-size:13px;
  letter-spacing:.04em;
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-size:15px;
}

.loader{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  padding:80px 20px;
}
.loader-flowers{display:flex;gap:10px;font-size:30px;}
.loader-flowers span{
  display:inline-block;
  animation:loader-bloom 1.2s ease-in-out infinite;
}
.loader-flowers span:nth-child(2){animation-delay:.2s;}
.loader-flowers span:nth-child(3){animation-delay:.4s;}
@keyframes loader-bloom{
  0%,100%{transform:scale(.7);opacity:.35;}
  50%{transform:scale(1.15);opacity:1;}
}
.loader-text{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
}
@media (prefers-reduced-motion: reduce){
  .loader-flowers span{animation:none;}
}

footer{
  text-align:center;
  padding:20px;
  font-size:11px;
  letter-spacing:.2em;
  color:var(--muted);
  text-transform:uppercase;
}

/* ─── Модальное окно заявки ─────────────────────────────── */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(44,42,39,.55);
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:1000;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--paper);
  border-radius:6px;
  max-width:560px;
  width:100%;
  max-height:88vh;
  overflow-y:auto;
  padding:30px 30px 28px;
  position:relative;
}
.modal-close{
  position:absolute;
  top:14px;
  right:16px;
  background:none;
  border:none;
  font-size:24px;
  line-height:1;
  color:var(--muted);
  cursor:pointer;
  padding:4px;
}
.modal-close:hover{color:var(--ink);}
.modal-item{
  display:flex;
  gap:14px;
  align-items:center;
  padding-bottom:18px;
  margin-bottom:20px;
  border-bottom:1px solid var(--line);
}
.modal-photo{
  width:64px;
  height:64px;
  border-radius:4px;
  background:var(--cream) center/cover no-repeat;
  flex-shrink:0;
}
.modal-name{font-family:'Playfair Display',Georgia,serif;font-size:18px;line-height:1.3;}
.modal-price{font-size:14px;color:var(--sage-dark);font-weight:600;margin-top:3px;}

.modal-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px 16px;
}
.modal-form .full{grid-column:1 / -1;}
.modal-form input:not([type=checkbox]):not([type=radio]),
.modal-form textarea,
.modal-form select{
  border:1px solid var(--line);
  padding:10px 12px;
  font-family:inherit;
  font-size:14px;
  border-radius:3px;
  width:100%;
  background:#fff;
  color:var(--ink);
}
.modal-form select{appearance:auto;}
.modal-form textarea{resize:vertical;min-height:64px;}
.modal-form .section-label{
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--sage-dark);
  padding-bottom:7px;
  border-bottom:1px solid var(--line);
  margin-top:6px;
}
.modal-form .section-label.first{margin-top:0;}
.modal-form .checkline{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13.5px;
  color:var(--ink);
}
.modal-form .recipient-fields{
  display:none;
  grid-column:1 / -1;
  gap:14px;
  grid-template-columns:1fr 1fr;
}
.modal-form .recipient-fields.show{display:grid;}
.modal-form .delivery-choice{
  display:flex;
  gap:22px;
  font-size:14px;
}
.modal-form .delivery-choice label{display:flex;align-items:center;gap:6px;}
.modal-form input[type=checkbox],
.modal-form input[type=radio]{
  accent-color:var(--sage-dark);
  width:16px;
  height:16px;
}
.modal-form .err{color:#a15a2c;font-size:12.5px;display:none;}
.modal-form .field-hint{
  font-size:11.5px;
  color:var(--muted);
  margin-top:-6px;
}
.address-field{position:relative;}
.address-suggest{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid var(--line);
  border-top:none;
  border-radius:0 0 3px 3px;
  max-height:180px;
  overflow-y:auto;
  z-index:10;
  box-shadow:0 6px 14px rgba(44,42,39,.1);
}
.address-suggest.show{display:block;}
.address-suggest .item{
  padding:8px 12px;
  font-size:13.5px;
  cursor:pointer;
}
.address-suggest .item:hover{background:var(--cream);}
.modal-form .send{
  background:var(--sage-dark);
  color:#fff;
  border:none;
  padding:13px;
  font-family:inherit;
  font-size:13.5px;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  margin-top:4px;
}
.modal-form .send:hover{background:var(--sage);}

@media (max-width:480px){
  .modal-form{grid-template-columns:1fr;}
  .modal-form .recipient-fields{grid-template-columns:1fr;}
}
</style>
</head>
<body>

      </div>
      <select id="ftime" class="full">
        <option value="">К какому времени нужен букет</option>
      </select>
      <div class="section-label full">3. Пожелания</div>
      <textarea id="fwishes" class="full" placeholder="Открытка, что передать, особые пожелания (необязательно)"></textarea>
      <div class="err full" id="formErr">Заполните обязательные поля</div>
      <button class="send full" id="sendBtn">Отправить заявку</button>
    </div>
  </div>
</div>

<script>
const SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbx0FYyE3hckyyyhzZPbf4X2gELlhLoGNj8YbRfJcjj1bTbKlKjo-n16cMUWN7SBnxDepw/exec';
const KASPI_LINK = 'https://pay.kaspi.kz/pay/qlv5kzz7';

function fmtPrice(p){
  const n = Number(p);
  if (isNaN(n)) return p;
  return n.toLocaleString('ru-RU') + ' ₸';
}

// Убирает служебную пометку упаковки в скобках в конце названия (напр. "(Ваниль)", "(Единый)") —
// это внутреннее обозначение варианта упаковки в Posiflora, покупателю оно не нужно.
// В саму заявку (Telegram/таблица) уходит оригинальное item.name — флористу это пригодится.
function cleanName(name){
  return (name || '').replace(/\s*\([^)]*\)\s*$/, '').trim();
}

// Маска телефона: набирает как угодно, приводит к "+7 XXX XXX XX XX"
function formatPhoneMask(value){
  let digits = value.replace(/\D/g, '');
  if (digits.startsWith('8')) digits = '7' + digits.slice(1);
  if (!digits.startsWith('7')) digits = '7' + digits;
  digits = digits.slice(0, 11);
  let out = '+7';
  if (digits.length > 1) out += ' ' + digits.slice(1, 4);
  if (digits.length > 4) out += ' ' + digits.slice(4, 7);
  if (digits.length > 7) out += ' ' + digits.slice(7, 9);
  if (digits.length > 9) out += ' ' + digits.slice(9, 11);
  return out;
}
function attachPhoneMask(input){
  input.addEventListener('input', () => {
    input.value = input.value ? formatPhoneMask(input.value) : '';
    input.setSelectionRange(input.value.length, input.value.length);
  });
}

let currentItem = null;
let currentCard = null;

const modalOverlay = document.getElementById('modalOverlay');
const modalPhoto = document.getElementById('modalPhoto');
const modalName = document.getElementById('modalName');
const modalPrice = document.getElementById('modalPrice');
const fname = document.getElementById('fname');
const fphone = document.getElementById('fphone');
const fsame = document.getElementById('fsame');
const recipientFields = document.getElementById('recipientFields');
const frname = document.getElementById('frname');
const frphone = document.getElementById('frphone');
const fpickup = document.getElementById('fpickup');
const fdelivery = document.getElementById('fdelivery');
const faddress = document.getElementById('faddress');
const addressField = document.getElementById('addressField');
const addressSuggest = document.getElementById('addressSuggest');
const ftime = document.getElementById('ftime');
const fwishes = document.getElementById('fwishes');
const formErr = document.getElementById('formErr');

attachPhoneMask(fphone);
attachPhoneMask(frphone);

// Строит список интервалов "Сегодня"/"Завтра" с 9:00 до 01:00, пропуская
// на сегодня те интервалы, которые уже полностью прошли к текущему времени
function buildTimeOptions(){
  const slots = [9, 11, 13, 15, 17, 19, 21, 23, 25]; // 25 = 01:00 следующего дня
  const now = new Date();
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  function hLabel(h){ return String(h % 24).padStart(2, '0') + ':00'; }

  function addOption(value){
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = value;
    ftime.appendChild(opt);
  }

  addOption('Как можно скорее');

  for (let i = 0; i < slots.length - 1; i++){
    const startH = slots[i], endH = slots[i + 1];
    if (endH * 60 <= nowMinutes) continue; // этот интервал на сегодня уже прошёл
    addOption('Сегодня, ' + hLabel(startH) + '–' + hLabel(endH));
  }
  for (let i = 0; i < slots.length - 1; i++){
    const startH = slots[i], endH = slots[i + 1];
    addOption('Завтра, ' + hLabel(startH) + '–' + hLabel(endH));
  }

  addOption('Другое — уточню по телефону');
}
buildTimeOptions();

function openModal(item, card){
  currentItem = item;
  currentCard = card;
  modalPhoto.style.backgroundImage = item.photo ? 'url(\'' + item.photo + '\')' : 'none';
  modalName.textContent = cleanName(item.name);
  modalPrice.textContent = fmtPrice(item.price);
  fname.value = '';
  fphone.value = '+7 ';
  fsame.checked = true;
  recipientFields.classList.remove('show');
  frname.value = '';
  frphone.value = '+7 ';
  fpickup.checked = true;
  fdelivery.checked = false;
  addressField.style.display = 'none';
  faddress.value = '';
  addressSuggest.classList.remove('show');
  addressSuggest.innerHTML = '';
  ftime.value = '';
  fwishes.value = '';
  formErr.style.display = 'none';
  modalOverlay.classList.add('open');
}

function closeModal(){
  modalOverlay.classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });

fsame.addEventListener('change', () => recipientFields.classList.toggle('show', !fsame.checked));

function toggleAddress(){ addressField.style.display = fdelivery.checked ? 'block' : 'none'; }
fpickup.addEventListener('change', toggleAddress);
fdelivery.addEventListener('change', toggleAddress);

// ─── Автоподсказка адреса (ymaps.suggest — официальный SDK, без CORS-проблем) ──
let addressDebounce = null;

faddress.addEventListener('input', () => {
  clearTimeout(addressDebounce);
  const text = faddress.value.trim();
  if (text.length < 3 || typeof ymaps === 'undefined'){
    addressSuggest.classList.remove('show');
    addressSuggest.innerHTML = '';
    return;
  }
  addressDebounce = setTimeout(() => fetchAddressSuggestions(text), 250);
});

function fetchAddressSuggestions(text){
  ymaps.ready(() => {
    ymaps.suggest(text, {
      results: 6,
      boundedBy: [[53.05, 63.4], [53.35, 63.85]], // область Костаная
    })
      .then(items => renderAddressSuggestions(items || []))
      .catch(() => { addressSuggest.classList.remove('show'); });
  });
}

function renderAddressSuggestions(items){
  addressSuggest.innerHTML = '';
  if (!items.length){
    addressSuggest.classList.remove('show');
    return;
  }
  items.forEach(item => {
    const label = item.displayName || item.value;
    const div = document.createElement('div');
    div.className = 'item';
    div.textContent = label;
    div.addEventListener('mousedown', (e) => {
      e.preventDefault(); // чтобы не сработал blur раньше клика
      faddress.value = item.value || label;
      addressSuggest.classList.remove('show');
      addressSuggest.innerHTML = '';
    });
    addressSuggest.appendChild(div);
  });
  addressSuggest.classList.add('show');
}

faddress.addEventListener('blur', () => {
  setTimeout(() => addressSuggest.classList.remove('show'), 150);
});

document.getElementById('sendBtn').addEventListener('click', () => {
  const name = fname.value.trim();
  const phone = fphone.value.trim();
  const sameRecipient = fsame.checked;
  const rname = sameRecipient ? name : frname.value.trim();
  const rphone = sameRecipient ? phone : frphone.value.trim();
  const isDelivery = fdelivery.checked;
  const address = faddress.value.trim();
  const time = ftime.value.trim();
  const wishes = fwishes.value.trim();

  const valid = name && phone.replace(/\D/g,'').length >= 10 &&
    (sameRecipient || (rname && rphone.replace(/\D/g,'').length >= 10)) &&
    (!isDelivery || address) &&
    time;

  if (!valid){
    formErr.style.display = 'block';
    return;
  }
  formErr.style.display = 'none';

  fetch(SUBMIT_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({
      type:'vitrina_order', bouquet: currentItem.name,
      name:name, phone:phone,
      recipientName:rname, recipientPhone:rphone,
      deliveryType: isDelivery ? 'Доставка' : 'Самовывоз',
      address: isDelivery ? address : '',
      time:time, wishes:wishes
    })
  }).catch(()=>{});

  if (currentCard) currentCard.classList.add('sent');
  closeModal();
});

function renderCard(item, idx){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<div class="photo"' + (item.photo ? ' style="background-image:url(\'' + item.photo + '\')"' : '') + '>' +
      (item.photo ? '' : 'фото скоро') +
    '</div>' +
    '<div class="body">' +
      '<div class="name">' + cleanName(item.name) + '</div>' +
      '<div class="price">' + fmtPrice(item.price) + '</div>' +
      '<button class="want">Хочу этот букет</button>' +
      '<div class="thanks">' +
        '<div>Заявку получили — свяжемся и вышлем Kaspi-перевод на указанный номер.</div>' +
        '<a class="kaspi-link" href="' + KASPI_LINK + '">Или оплатить сразу самому по Kaspi</a>' +
      '</div>' +
    '</div>';

  card.querySelector('.want').addEventListener('click', () => openModal(item, card));

  return card;
}

fetch(SUBMIT_URL, {
  method:'POST',
  headers:{'Content-Type':'text/plain'},
  body: JSON.stringify({ type:'vitrina_list' })
})
  .then(r => r.json())
  .then(items => {
    document.getElementById('loader').style.display = 'none';
    const grid = document.getElementById('grid');
    if (!items || !items.length){
      document.getElementById('empty').style.display = 'block';
      return;
    }
    items.forEach((item, idx) => grid.appendChild(renderCard(item, idx)));
  })
  .catch(() => {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  });
</script>

</body>
</html>
